<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kora</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>" />
</head>
<body>

<div class="app-layout">

  <!-- ─── Sidebar ─────────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <a href="/" class="sidebar-logo">
        <span class="logo-mark">◈</span>
        <span class="logo-text">kora</span>
      </a>
      <button class="btn-new-chat" id="btn-new-chat" title="Nova conversa">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Conversas recentes</div>
      <div class="conv-list" id="conv-list">
        <div class="conv-empty">Nenhuma conversa ainda.</div>
      </div>
    </div>

    <div class="sidebar-bottom">
      <!-- Painel de Memória rápido -->
      <div class="memory-panel" id="memory-panel">
        <div class="memory-panel-header">
          <span class="mp-icon">◈</span>
          <span class="mp-title">Minha Memória</span>
          <button class="mp-expand" id="mp-expand" title="Ver detalhes">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="memory-panel-body" id="mp-body" style="display:none">
          <div class="mp-stat-row">
            <span class="mp-stat-label">Nós de conhecimento</span>
            <span class="mp-stat-val" id="mp-nodes">—</span>
          </div>
          <div class="mp-stat-row">
            <span class="mp-stat-label">Foco atual</span>
            <span class="mp-stat-val" id="mp-focus">—</span>
          </div>
          <div class="mp-nodes-list" id="mp-nodes-list"></div>
          <button class="btn btn-ghost btn-sm mp-export" id="mp-export">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M6 1v7M3 5l3 3 3-3M1 9v2h10V9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Exportar .kora
          </button>
        </div>
      </div>

      <!-- User info -->
      <div class="user-row">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="user-name">Carregando...</div>
          <div class="user-plan" id="user-plan">Free</div>
        </div>
        <button class="user-menu-btn" id="user-menu-btn" title="Menu">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="4" r="1" fill="currentColor"/>
            <circle cx="8" cy="8" r="1" fill="currentColor"/>
            <circle cx="8" cy="12" r="1" fill="currentColor"/>
          </svg>
        </button>
      </div>

      <!-- User menu dropdown -->
      <div class="user-dropdown" id="user-dropdown" style="display:none">
        <button class="dd-item" id="dd-logout">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M5 2H2v10h3M9 10l3-3-3-3M12 7H5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Sair
        </button>
      </div>
    </div>
  </aside>

  <!-- ─── Área de chat ──────────────────────────────────────────────────── -->
  <main class="chat-area">

    <!-- Header mobile -->
    <div class="chat-header">
      <button class="sidebar-toggle" id="sidebar-toggle">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 5h12M3 9h12M3 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="chat-header-title" id="chat-title">Nova conversa</span>
      <div style="width:32px"></div>
    </div>

    <!-- Mensagens -->
    <div class="messages-area" id="messages-area">
      <!-- Welcome screen -->
      <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-mark">◈</div>
        <h2 id="welcome-title">Olá.</h2>
        <p id="welcome-sub">No que posso pensar com você hoje?</p>

        <div class="welcome-suggestions">
          <button class="suggestion-chip" data-msg="Me ajude a estruturar meu projeto atual">
            Estruturar meu projeto
          </button>
          <button class="suggestion-chip" data-msg="Quero resolver um problema técnico">
            Problema técnico
          </button>
          <button class="suggestion-chip" data-msg="Me ajude a tomar uma decisão importante">
            Tomar uma decisão
          </button>
          <button class="suggestion-chip" data-msg="Quero revisar e refinar uma ideia">
            Refinar uma ideia
          </button>
        </div>

        <!-- Limite de mensagens -->
        <div class="msg-limit-bar" id="msg-limit-bar" style="display:none">
          <div class="mlb-track">
            <div class="mlb-fill" id="mlb-fill"></div>
          </div>
          <span id="mlb-text">0 / 50 mensagens hoje</span>
        </div>
      </div>

      <!-- Mensagens do chat renderizadas aqui -->
      <div class="messages-list" id="messages-list" style="display:none"></div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-row">
        <div class="textarea-wrap">
          <textarea
            id="chat-input"
            class="chat-textarea"
            placeholder="Escreva sua mensagem... (Enter para enviar)"
            rows="1"
            maxlength="4000"
          ></textarea>
        </div>
        <button class="send-btn" id="send-btn" disabled title="Enviar">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M3 9h12M11 5l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span class="input-hint">Enter para enviar · Shift+Enter para nova linha</span>
        <span class="char-count" id="char-count"></span>
      </div>
    </div>

  </main>

</div><!-- /app-layout -->

<!-- Sidebar overlay mobile -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="toast-container" id="toast-container"></div>

<script src="/js/memory.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
